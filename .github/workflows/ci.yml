name: CI

on:
  push:
    branches:
      - main
      - stg
  pull_request:
    branches:
      - main
      - stg

jobs:
  # Detect which paths changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      typescript: ${{ steps.filter.outputs.typescript }}
      shell: ${{ steps.filter.outputs.shell }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'apps/api/**'
              - 'pyproject.toml'
            typescript:
              - 'apps/gateway-control/**'
              - 'apps/airis-commands/**'
            shell:
              - 'scripts/airis-gateway'
              - 'scripts/quick-install.sh'
              - 'scripts/test-airis-gateway-smoke.sh'
              - 'install.sh'
              - '.tasks.d/test.yml'
              - '.github/workflows/ci.yml'

  # Python tests (only when Python files change)
  test-python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: |
          cd apps/api
          uv pip install --system -e ".[test]"

      - name: Run tests with coverage
        run: |
          cd apps/api
          python -m pytest tests/unit -v --tb=short --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: apps/api/coverage.xml
          flags: python
          fail_ci_if_error: false

      - name: Security scan (bandit)
        run: |
          pip install bandit
          bandit -r apps/api/src -ll -ii

  # TypeScript build and test (only when TS files change)
  build-typescript:
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [gateway-control, airis-commands]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd apps/${{ matrix.package }}
          npm install

      - name: Run tests
        run: |
          cd apps/${{ matrix.package }}
          npm test

      - name: Typecheck
        run: |
          cd apps/${{ matrix.package }}
          npx tsc --noEmit

      - name: Build
        run: |
          cd apps/${{ matrix.package }}
          npm run build

  test-shell:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run airis-gateway smoke tests
        run: bash scripts/test-airis-gateway-smoke.sh

  # Auto-merge next to main
  merge-to-main:
    needs: [test-python, build-typescript, test-shell]
    if: |
      always() &&
      github.ref == 'refs/heads/stg' &&
      github.event_name == 'push' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Merge stg to main
        run: |
          git fetch origin main
          git checkout main
          git merge origin/stg --no-edit
          git push origin main

          echo "✅ Merged stg → main"
