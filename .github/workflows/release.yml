name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Get highest version tag (sort semantically)
          LATEST_TAG=$(git tag -l 'v*' | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          CURRENT_VERSION=${LATEST_TAG#v}

          echo "📦 Current version: $CURRENT_VERSION (from $LATEST_TAG)"

          # Parse semver
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          # Get commit messages since last tag
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          # Determine bump type based on conventional commits
          BUMP_TYPE="patch"

          if echo "$COMMITS" | grep -qE '^(feat!:|fix!:|BREAKING CHANGE:)'; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP_TYPE="minor"
          fi

          # Calculate new version
          if [ "$BUMP_TYPE" = "major" ]; then
            NEW_VERSION="$((major + 1)).0.0"
          elif [ "$BUMP_TYPE" = "minor" ]; then
            NEW_VERSION="${major}.$((minor + 1)).0"
          else
            NEW_VERSION="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "🚀 Bumping $CURRENT_VERSION → $NEW_VERSION ($BUMP_TYPE)"

      - name: Check if already released
        id: check_tag
        run: |
          if git rev-parse "v${{steps.version.outputs.version}}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️  Tag v${{steps.version.outputs.version}} already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Will create release v${{steps.version.outputs.version}}"
          fi

      - name: Sync versions and commit back
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          NEW_VERSION=${{steps.version.outputs.version}}
          echo "$NEW_VERSION" > VERSION

          # Run the sync task to update package.json/pyproject.toml
          # Need to install go-task for this, but simpler to use the script logic directly:
          # Node.js (package.json)
          for f in apps/*/package.json; do
            if [ -f "$f" ]; then
              sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/" "$f"
              echo "✅ Updated $f"
            fi
          done
          # Python (pyproject.toml)
          for f in apps/*/pyproject.toml; do
            if [ -f "$f" ]; then
              sed -i "s/version = \".*\"/version = \"$NEW_VERSION\"/" "$f"
              echo "✅ Updated $f"
            fi
          done

          # Configure git and commit back
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION apps/*/package.json apps/*/pyproject.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push origin main

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          VERSION=${{steps.version.outputs.version}}

          echo "🚀 Creating GitHub Release v${VERSION}..."

          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --generate-notes

          echo "✅ Release v${VERSION} created successfully!"
