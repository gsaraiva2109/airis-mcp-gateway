version: '3'

vars:
  REPO_ROOT:
    sh: git rev-parse --show-toplevel

includes:
  docker:
    taskfile: .tasks.d/docker.yml
    optional: false
  dev:
    taskfile: .tasks.d/dev.yml
    optional: false
  build:
    taskfile: .tasks.d/build.yml
    optional: false
  test:
    taskfile: .tasks.d/test.yml
    optional: false
  autostart:
    taskfile: .tasks.d/autostart.yml
    optional: false

tasks:
  version:sync:
    desc: Sync all package versions from root VERSION file (Single Source of Truth)
    cmds:
      - |
        VERSION=$(cat VERSION | tr -d '[:space:]')
        echo "🔄 Syncing version: $VERSION"
        # Node.js (package.json)
        for f in apps/*/package.json; do
          if [ -f "$f" ]; then
            sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" "$f" && rm "$f.bak"
            echo "✅ Updated $f"
          fi
        done
        # Python (pyproject.toml)
        for f in apps/*/pyproject.toml; do
          if [ -f "$f" ]; then
            sed -i.bak "s/version = \".*\"/version = \"$VERSION\"/" "$f" && rm "$f.bak"
            echo "✅ Updated $f"
          fi
        done

  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  init:
    desc: Initialize development environment
    cmds:
      - task: build:mcp
      - task: docker:up
      - echo "Stack ready at http://localhost:9400"

  status:
    desc: Quick status check
    cmds:
      - task: docker:ps
      - echo ""
      - task: test:health
